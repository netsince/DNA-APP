name: Release

on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ios-secrets-check:
    name: Check iOS signing secrets
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          IOS_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          IOS_PWD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PP: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          if [ -n "$IOS_P12" ] && [ -n "$IOS_PWD" ] && [ -n "$IOS_PP" ]; then
            echo "has-secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-secrets=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }} (${{ matrix.type }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Android: fat APK + split-per-abi
          - { platform: android, runner: ubuntu-latest, type: release }
          - { platform: android, runner: ubuntu-latest, type: debug }
          # Linux (x64 only — default; linux-arm64 is experimental)
          - { platform: linux,   runner: ubuntu-latest, type: release, arch: x64 }
          - { platform: linux,   runner: ubuntu-latest, type: debug,   arch: x64 }
          # Windows amd64 (x64) — host build on the x64 runner
          - { platform: windows, runner: windows-latest, type: release, arch: amd64, winarch: x64 }
          - { platform: windows, runner: windows-latest, type: debug,   arch: amd64, winarch: x64 }
          # Windows arm64 — host build on the Windows-on-Arm runner
          #   (windows-11-arm, public preview, free for public repos)
          - { platform: windows, runner: windows-11-arm, type: release, arch: arm64, winarch: arm64 }
          - { platform: windows, runner: windows-11-arm, type: debug,   arch: arm64, winarch: arm64 }
          # macOS Intel (x64) — must run on an Intel runner (macos-15-intel),
          #   since `flutter build macos` only builds the host architecture
          - { platform: macos,   runner: macos-15-intel, type: release, arch: x64 }
          - { platform: macos,   runner: macos-15-intel, type: debug,   arch: x64 }
          # macOS Apple Silicon (arm64) — runs on the Apple Silicon runner
          - { platform: macos,   runner: macos-latest, type: release, arch: arm64 }
          - { platform: macos,   runner: macos-latest, type: debug,   arch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        if: matrix.platform == 'android'
        with:
          distribution: zulu
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - run: flutter pub get

      # ---- Android: fat APK + split-per-abi APKs ----
      - name: Build Android APK (fat, ${{ matrix.type }})
        if: matrix.platform == 'android'
        run: flutter build apk --${{ matrix.type }}
      - name: Build Android APK (split-per-abi, ${{ matrix.type }})
        if: matrix.platform == 'android'
        run: flutter build apk --${{ matrix.type }} --split-per-abi

      # ---- Linux ----
      - name: Build Linux (${{ matrix.arch }}, ${{ matrix.type }})
        if: matrix.platform == 'linux'
        run: flutter build linux --${{ matrix.type }}

      # ---- Windows (host arch = x64) ----
      - name: Build Windows (${{ matrix.arch }}, ${{ matrix.type }})
        if: matrix.platform == 'windows'
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
        run: flutter build windows --${{ matrix.type }}

      # ---- macOS (host arch only; x64 on Intel runner, arm64 on Apple Silicon runner) ----
      - name: Build macOS (${{ matrix.arch }}, ${{ matrix.type }})
        if: matrix.platform == 'macos'
        run: flutter build macos --${{ matrix.type }}

      # ---- Package & Upload ----
      - name: Upload Android
        if: matrix.platform == 'android'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          overwrite_files: true
          fail_on_unmatched_files: false
          files: |
            build/app/outputs/flutter-apk/app-${{ matrix.type }}.apk
            build/app/outputs/flutter-apk/app-*-${{ matrix.type }}.apk

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: zip -r dna-linux-${{ matrix.arch }}-${{ matrix.type }}.zip build/linux/x64/${{ matrix.type }}/bundle
      - name: Upload Linux
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          overwrite_files: true
          fail_on_unmatched_files: false
          files: dna-linux-${{ matrix.arch }}-${{ matrix.type }}.zip

      - name: Package Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -Path "build\windows\${{ matrix.winarch }}\runner\${{ matrix.type }}\*" -DestinationPath "dna-windows-${{ matrix.arch }}-${{ matrix.type }}.zip"
      - name: Upload Windows
        if: matrix.platform == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          overwrite_files: true
          fail_on_unmatched_files: false
          files: dna-windows-${{ matrix.arch }}-${{ matrix.type }}.zip

      - name: Package macOS
        if: matrix.platform == 'macos'
        run: zip -r dna-macos-${{ matrix.arch }}-${{ matrix.type }}.zip build/macos/Build/Products/${{ matrix.type }}
      - name: Upload macOS
        if: matrix.platform == 'macos'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          overwrite_files: true
          fail_on_unmatched_files: false
          files: dna-macos-${{ matrix.arch }}-${{ matrix.type }}.zip

  ios:
    name: Build iOS (requires signing secrets)
    needs: ios-secrets-check
    if: needs.ios-secrets-check.outputs.has-secrets == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install the Apple certificate and provisioning profile
        env:
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "${{ secrets.IOS_DIST_CERT_P12 }}" | base64 --decode -o "$CERT_PATH"
          echo -n "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode -o "$PP_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles
      - run: flutter pub get
      - name: Build IPA
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          overwrite_files: true
          fail_on_unmatched_files: false
          files: build/ios/ipa/*.ipa
