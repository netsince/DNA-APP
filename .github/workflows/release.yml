name: Release

on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Build AppBundle
        run: flutter build appbundle --release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.event.release.tag_name || github.ref_name }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release
      - name: Package
        run: cd build/linux/x64/release/bundle && zip -r ../../../dna-linux.zip . && cd ../../../../..
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.event.release.tag_name || github.ref_name }}
          files: dna-linux.zip

  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "dna-windows.zip"
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.event.release.tag_name || github.ref_name }}
          files: dna-windows.zip

  macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build macOS
        run: flutter build macos --release
      - name: Package
        run: zip -r dna-macos.zip build/macos/Build/Products/Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.event.release.tag_name || github.ref_name }}
          files: dna-macos.zip

  ios-secrets-check:
    name: Check iOS signing secrets
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          IOS_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          IOS_PWD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PP: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          if [ -n "$IOS_P12" ] && [ -n "$IOS_PWD" ] && [ -n "$IOS_PP" ]; then
            echo "has-secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-secrets=false" >> "$GITHUB_OUTPUT"
          fi

  ios:
    name: Build iOS (requires signing secrets)
    needs: ios-secrets-check
    if: needs.ios-secrets-check.outputs.has-secrets == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install the Apple certificate and provisioning profile
        env:
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "${{ secrets.IOS_DIST_CERT_P12 }}" | base64 --decode -o "$CERT_PATH"
          echo -n "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode -o "$PP_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles
      - run: flutter pub get
      - name: Build IPA
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag: ${{ github.event.release.tag_name || github.ref_name }}
          files: build/ios/ipa/*.ipa
