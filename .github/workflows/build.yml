name: Manual Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all builds every platform)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - android
          - web
          - linux
          - windows
          - macos

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            runner: ubuntu-latest
            artifact: android
          - platform: linux
            runner: ubuntu-latest
            artifact: linux
          - platform: windows
            runner: windows-latest
            artifact: windows
          - platform: macos
            runner: macos-latest
            artifact: macos
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/setup-java@v4
        if: matrix.platform == 'android'
        with:
          distribution: zulu
          java-version: '17'

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - run: flutter pub get

      - name: Build Android
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: flutter build linux --release

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Package & Upload Artifact (Android)
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Package & Upload Artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/linux/x64/release/bundle/**

      - name: Package & Upload Artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows/x64/runner/Release/**

      - name: Package & Upload Artifact (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/macos/Build/Products/Release/*.app
